<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <h1>Keep Clone</h1>

    <form id="noteForm">
        <input type="text" id="title" placeholder="Judul" required autocomplete="off">
        <textarea id="content" placeholder="Tulis catatan..."></textarea>
        <div class="btn-container">
            <button type="button" id="cancelBtn" class="btn-cancel">Batal Edit</button>
            <button type="submit" id="submitBtn" class="btn-save">Simpan</button>
        </div>
    </form>

    <div id="notesContainer"></div>

    <script src="/js/app.js"></script>
</body>
</html>
